<!DOCTYPE html>
<html>
<head><title>Gerar Ícones — Bolso do Fred</title></head>
<body style="font-family:sans-serif;padding:40px;background:#f5f5f5;">
    <h1>🎨 Gerador de Ícones — O Bolso do Fred</h1>
    <p>Clique no botão para baixar todos os ícones:</p>
    <button id="btn-gerar" style="font-size:18px;padding:16px 32px;cursor:pointer;background:#2d8659;color:white;border:none;border-radius:12px;">📥 Gerar e Baixar Todos os Ícones</button>
    <div id="preview" style="margin-top:20px;display:flex;flex-wrap:wrap;gap:16px;"></div>

    <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

    function gerarIcone(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Fundo gradiente
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#2d8659');
        grad.addColorStop(1, '#3aa76d');

        // Fundo arredondado (maskable safe zone)
        const r = size * 0.18;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Círculo interno branco semi-transparente
        ctx.beginPath();
        ctx.arc(size / 2, size * 0.44, size * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fill();

        // Emoji de moeda (💰)
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${size * 0.38}px serif`;
        ctx.fillText('💰', size / 2, size * 0.42);

        // Texto "Fred"
        ctx.font = `bold ${size * 0.13}px -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.fillStyle = 'white';
        ctx.fillText('FRED', size / 2, size * 0.74);

        // Linha decorativa
        const lineW = size * 0.28;
        ctx.beginPath();
        ctx.moveTo((size - lineW) / 2, size * 0.82);
        ctx.lineTo((size + lineW) / 2, size * 0.82);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = size * 0.015;
        ctx.stroke();

        return canvas;
    }

    document.getElementById('btn-gerar').addEventListener('click', () => {
        const preview = document.getElementById('preview');
        preview.innerHTML = '';

        sizes.forEach((size) => {
            const canvas = gerarIcone(size);

            // Preview
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'text-align:center;';
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            label.style.cssText = 'font-size:12px;color:#666;margin-bottom:4px;';
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.style.cssText = `width:${Math.min(size, 128)}px;height:${Math.min(size, 128)}px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.2);`;
            wrapper.appendChild(label);
            wrapper.appendChild(img);
            preview.appendChild(wrapper);

            // Baixar
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        alert('✅ Todos os ícones foram baixados! Coloque-os na pasta "icons/"');
    });
    </script>
</body>
</html>
